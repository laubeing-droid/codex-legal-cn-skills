name: Sync from ALN Framework

on:
  repository_dispatch:
    types: [align-framework-updated]
  workflow_dispatch:

jobs:
  sync-alignment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone ALN framework
        run: |
          git clone --depth 1 https://github.com/laubeing-droid/PRC-US-Legal-Semantic-Alignment-Framework.git /tmp/align-framework

      - name: Run diff-tool-align
        shell: pwsh
        run: |
          $alignDir = "/tmp/align-framework"
          $patchesDir = "${{ github.workspace }}/patches"
          
          # Copy full framework
          Copy-Item "$alignDir/PRC-US-Legal-Semantic-Alignment-Framework.md" "$patchesDir/references/" -Force -ErrorAction SilentlyContinue
          
          # Split into guards/ and alignment/ (mirrors diff-tool-align logic)
          $content = Get-Content "$alignDir/PRC-US-Legal-Semantic-Alignment-Framework.md" -Raw -Encoding UTF8
          
          # Update blocking list
          $blockingOld = Get-Content "$patchesDir/guards/blocking-list.md" -Raw -Encoding UTF8
          $blockingHash = (Get-FileHash -InputStream ([System.IO.MemoryStream]::new([System.Text.Encoding]::UTF8.GetBytes($blockingOld))) -Algorithm SHA256).Hash
          
          # Check if alignment files changed
          $changed = $false
          Get-ChildItem "$alignDir" -Filter "*.md" -Recurse | ForEach-Object {
            $relPath = $_.FullName.Replace($alignDir, "").TrimStart("/\")
            $destPath = Join-Path $patchesDir "references/alignment" $relPath
            if (Test-Path $destPath) {
              $srcHash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
              $destHash = (Get-FileHash $destPath -Algorithm SHA256).Hash
              if ($srcHash -ne $destHash) {
                Copy-Item $_.FullName $destPath -Force
                Write-Host "Updated: $relPath"
                $changed = $true
              }
            }
          }

          if ($changed) {
            echo "CHANGED=true" >> $env:GITHUB_ENV
          } else {
            echo "CHANGED=false" >> $env:GITHUB_ENV
          }

      - name: Create PR if changed
        if: env.CHANGED == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "sync: ALN framework auto-sync from upstream"
          branch: sync/aln-framework
          title: "Auto-sync: ALN Framework updates detected"
          body: |
            Auto-synced from [laubeing-droid/PRC-US-Legal-Semantic-Alignment-Framework](https://github.com/laubeing-droid/PRC-US-Legal-Semantic-Alignment-Framework).
            
            Please review the changes before merging. Pay special attention to:
            - blocking-list.md changes
            - alignment file changes
          labels: auto-sync, needs-review